services:
  - type: web
    name: napalai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 30
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
